<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="chat-body">
    <div class="chat-layout">
        <header class="chat-header flex-header">
            <button onclick="window.location.href='/'" class="back-btn">⬅ Change Mode</button>
            <h2 id="current-mode-title" class="mode-title-glow">AI Assistant</h2>
        </header>

        <main class="chat-container">
            <div id="chat-box" class="chat-box">
                <!-- Chat messages will be injected here -->
            </div>
        </main>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleEnter(event)" autocomplete="off" />
            <button onclick="sendMessage()" id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
    
    <footer>
        <p>Students: Reyansh kumar, Shrish Ahankari, Anisha Sharma | Guide: Poonkodi</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
